    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetch('Component/_navbar.html')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Red de red en error al cargar el encabezado.');
                    }
                    return response.text();
                })
                .then(data => {
                    document.getElementById('sidebar').innerHTML = data;
                })
                .catch(error => console.error('Error al cargar el encabezado:', error));
        });
        document.addEventListener("DOMContentLoaded", function () {
            fetch('Component/_navbarDefault.html')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Red de red en error al cargar el encabezado.');
                    }
                    return response.text();
                })
                .then(data => {
                    document.getElementById('idDefault').innerHTML = data;
                })
                .catch(error => console.error('Error al cargar el encabezado:', error));
        });

        document.addEventListener("DOMContentLoaded", function () {
            debugger;
            const params = new URLSearchParams(window.location.search);
            var valor = getParameterByName('parametro');
            //  var valor = params.get('parametro');
            if (valor == null) {
                valor = "Inicio"
            }
            fetch(`pages/forms/${valor}.html`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Red de red en error al cargar el encabezado.');
                    }
                    return response.text();
                })
                .then(data => {


                    document.getElementById('IdForm').innerHTML = data;
                    if (valor == "Inicio") {
                        const slides = document.querySelectorAll('.swiper-slide');
                        slides.forEach(function (slide) {
                            const bg = slide.getAttribute('data-slide-bg');
                            if (bg) {
                                slide.style.backgroundImage = `url(${bg})`;
                                slide.style.backgroundSize = 'cover';
                                slide.style.backgroundPosition = 'center';
                            }
                        });
                    }
                })
                .catch(error => console.error('Error al cargar el encabezado:', error));

            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.pushState({ path: newUrl }, '', newUrl);

        });

        function getParameterByName(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }
    </script>
